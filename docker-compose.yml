services:

  mysql:
    image: mysql:8
    container_name: eventsync-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eventsync
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./eventsync-backend
    container_name: eventsync-backend
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"

  frontend:
    build: ./eventsync-frontend
    container_name: eventsync-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
